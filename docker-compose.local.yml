version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg14
    container_name: pg-health-db-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: health_diagnosis
    ports:
      - "5432:5432"
    volumes:
      - pg-data-local:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: health-backend-local
    ports:
      - "8080:8080"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-disabled}
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health-frontend-local
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg-data-local: