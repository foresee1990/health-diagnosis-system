version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg14
    container_name: pg-health-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: health_diagnosis
    volumes:
      - pg-data:/var/lib/postgresql/data
      - reports-data:/app/reports
      - knowledge-data:/app/knowledge-uploads
    restart: always

  backend:
    build: ./backend
    container_name: health-backend
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    volumes:
      - reports-data:/app/reports
      - knowledge-data:/app/knowledge-uploads
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: health-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pg-data:
  reports-data:
  knowledge-data: